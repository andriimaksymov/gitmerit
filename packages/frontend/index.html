<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- media="print" + onload swap keeps the fonts CSS from blocking first paint -->
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet">
  </noscript>
  <!-- This static head is served for every SPA route (vercel.json rewrites all
       paths to index.html), so no canonical/og:url here — they would claim every
       route is the homepage. -->
  <meta name="description"
    content="GitMerit scores your GitHub profile, resume, and LinkedIn with AI-backed, evidence-based feedback and a concrete improvement roadmap." />
  <meta name="author" content="Andrii Maksymov" />
  <meta name="theme-color" content="#615fff" />

  <!-- Open Graph (twitter:* omitted — X falls back to og:* except twitter:card) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="GitMerit" />
  <meta property="og:title" content="GitMerit — Score your developer profile" />
  <meta property="og:description"
    content="GitMerit scores your GitHub profile, resume, and LinkedIn with AI-backed, evidence-based feedback and a concrete improvement roadmap." />
  <meta property="og:image" content="https://gitmerit.vercel.app/web-app-manifest-512x512.png" />
  <meta name="twitter:card" content="summary" />
  <title>GitMerit — Score your developer profile</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "GitMerit",
    "url": "https://gitmerit.vercel.app/",
    "description": "GitMerit scores your GitHub profile, resume, and LinkedIn with AI-backed, evidence-based feedback and a concrete improvement roadmap.",
    "applicationCategory": "DeveloperApplication"
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
